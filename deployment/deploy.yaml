# Reference copy — canonical manifests: Pod10-infrastructure-main/k8s/bank-app/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-backend-deployment
  namespace: bank-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-backend
  template:
    metadata:
      labels:
        app: bank-backend
    spec:
      containers:
      - name: bank-backend-container
        image: REPLACE_ECR_REGISTRY/bank-backendapi:latest
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: bank-backend-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: bank-backend-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: bank-backend-config
              key: DB_NAME
        - name: CORS_ALLOWED_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: bank-backend-config
              key: CORS_ALLOWED_ORIGIN
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: bank-backend-secret
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bank-backend-secret
              key: DB_PASSWORD
