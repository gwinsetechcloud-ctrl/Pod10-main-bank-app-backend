# MySQL Properties — set via environment variables or K8s secrets (see deployment/secret.yaml)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pod10fintech_db}?createDatabaseIfNotExist=true&useUnicode=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect

springdoc.packagesToScan=com.onlinebankingsystem.controller
springdoc.pathsToMatch=/api/**

cors.allowed-origin=${CORS_ALLOWED_ORIGIN:https://bank.cohort5pod10.online}
